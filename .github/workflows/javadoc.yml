name: Publish Javadoc

on:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  javadoc:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Javadoc
        run: ./gradlew javadoc

      - name: Assemble Javadoc site
        run: |
          mkdir -p javadoc-site
          for module in sanitizer-core sanitizer-spring sanitizer-jpa; do
            if [ -d "$module/build/docs/javadoc" ]; then
              cp -r "$module/build/docs/javadoc" "javadoc-site/$module"
            fi
          done
          cat > javadoc-site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head><title>Sanitizer-Lib API Documentation</title></head>
          <body>
          <h1>Sanitizer-Lib API Documentation</h1>
          <ul>
            <li><a href="sanitizer-core/">sanitizer-core</a> — Core API &amp; Built-in Sanitizers</li>
            <li><a href="sanitizer-spring/">sanitizer-spring</a> — Spring Boot Integration</li>
            <li><a href="sanitizer-jpa/">sanitizer-jpa</a> — JPA Integration</li>
          </ul>
          </body>
          </html>
          HTMLEOF

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: javadoc-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
