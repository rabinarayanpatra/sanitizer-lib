name: Publish Site

on:
  release:
    types: [published]
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/publish-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  javadoc:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Javadoc
        run: ./gradlew javadoc

      - name: Assemble site (landing page + Javadoc)
        run: |
          mkdir -p site/javadoc
          cp docs/index.html site/index.html
          for module in sanitizer-core sanitizer-spring sanitizer-jpa; do
            if [ -d "$module/build/docs/javadoc" ]; then
              cp -r "$module/build/docs/javadoc" "site/javadoc/$module"
            fi
          done
          cat > site/javadoc/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <title>Sanitizer-Lib API Documentation</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1.5rem; background: #09090b; color: #f4f4f5; }
              h1 { font-weight: 700; letter-spacing: -0.02em; }
              a { color: #f97316; text-decoration: none; }
              a:hover { text-decoration: underline; }
              ul { line-height: 2; }
              .back { display: inline-block; margin-bottom: 2rem; color: #a1a1aa; font-size: 0.9rem; }
            </style>
          </head>
          <body>
            <a class="back" href="../">← Back to Sanitizer-Lib</a>
            <h1>API Documentation</h1>
            <ul>
              <li><a href="sanitizer-core/">sanitizer-core</a> — Core API &amp; Built-in Sanitizers</li>
              <li><a href="sanitizer-spring/">sanitizer-spring</a> — Spring Boot Integration</li>
              <li><a href="sanitizer-jpa/">sanitizer-jpa</a> — JPA Integration</li>
            </ul>
          </body>
          </html>
          HTMLEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
